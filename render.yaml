services:
  - type: web
    name: mbbs-study-assistant
    env: docker
    dockerfilePath: ./Dockerfile
    plan: standard
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
